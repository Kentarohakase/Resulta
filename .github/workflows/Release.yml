name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  ARTIFACTS_DIR: ./artifacts

jobs:
  release:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: latest

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack Resulta
        run: dotnet pack ./Resulta/Resulta.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Pack Resulta.AspNetCore
        run: dotnet pack ./Resulta.AspNetCore/Resulta.AspNetCore.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Pack Resulta.FluentValidation
        run: dotnet pack ./Resulta.FluentValidation/Resulta.FluentValidation.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Publish to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          for package in "${{ env.ARTIFACTS_DIR }}"/*.nupkg; do
            echo "Publishing $package"
            nuget push "$package" \
              -Source "${{ env.NUGET_SOURCE }}" \
              -SkipDuplicate \
              -NonInteractive
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.ARTIFACTS_DIR }}/*.nupkg
            ${{ env.ARTIFACTS_DIR }}/*.snupkg