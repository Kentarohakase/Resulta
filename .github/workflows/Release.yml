name: Release & Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_VERSION: '10.0.x'
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  ARTIFACTS_DIR: ./artifacts

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Pack & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            ${{ env.DOTNET_VERSION }}

      - name: Check for merge conflict markers
        shell: pwsh
        run: |
          $matches = git grep -n -E '^(<<<<<<<|=======|>>>>>>>)'
          if ($LASTEXITCODE -eq 0) {
            $matches
            throw "Merge conflict markers found. Resolve them before releasing."
          }
          if ($LASTEXITCODE -gt 1) {
            exit $LASTEXITCODE
          }

      - name: Determine NuGet publish eligibility
        id: release_policy
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $publish = $refName -match '^v\d+\.\d+\.0$'
          "publish_to_nuget=$($publish.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          Write-Host "NuGet publish enabled: $publish"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack Resulta
        run: dotnet pack .\Resulta\Resulta.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Pack Resulta.AspNetCore
        run: dotnet pack .\Resulta.AspNetCore\Resulta.AspNetCore.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Pack Resulta.FluentValidation
        run: dotnet pack .\Resulta.FluentValidation\Resulta.FluentValidation.csproj -c Release --no-build --output ${{ env.ARTIFACTS_DIR }}

      - name: Publish to NuGet
        if: steps.release_policy.outputs.publish_to_nuget == 'true'
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if (-not $env:NUGET_API_KEY) {
            throw "NUGET_API_KEY secret is not set. Add it under Settings > Secrets and variables > Actions."
          }
          Get-ChildItem "${{ env.ARTIFACTS_DIR }}" -Filter *.nupkg | ForEach-Object {
            Write-Host "Publishing $($_.FullName)"
            dotnet nuget push $_.FullName `
              --api-key $env:NUGET_API_KEY `
              --source "${{ env.NUGET_SOURCE }}" `
              --skip-duplicate
          }

      - name: Skip NuGet publish for patch or manual run
        if: steps.release_policy.outputs.publish_to_nuget != 'true'
        run: echo "NuGet publish skipped because only vX.Y.0 tags are published to NuGet."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.ARTIFACTS_DIR }}/*.nupkg
            ${{ env.ARTIFACTS_DIR }}/*.snupkg
